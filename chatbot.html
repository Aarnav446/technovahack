<!-- chatbot.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AIEDU - AI Whiteboard</title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Remix Icons -->

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
    rel="stylesheet"
  />

  <!-- GSAP -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0a0a0a;
      color:white;
      overflow-x:hidden;
      min-height:100vh;
    }

    .grid-bg{

      background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

      background-size:50px 50px;
    }

    .glass{

      background:rgba(255,255,255,0.03);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.06);

      box-shadow:0 4px 20px rgba(255,255,255,0.03);
    }

    .gradient-text{

      background:linear-gradient(to right,#ffffff,#9ca3af);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .blur-ball{

      position:absolute;

      width:220px;
      height:220px;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.08;

      z-index:-1;
    }

    #board{
      cursor:crosshair;
      display:block;
    }

    ::-webkit-scrollbar{
      width:8px;
    }

    ::-webkit-scrollbar-thumb{
      background:#27272a;
      border-radius:20px;
    }

  </style>

</head>

<body class="grid-bg">

  <!-- BLURS -->

  <div class="blur-ball bg-white top-0 left-0"></div>
  <div class="blur-ball bg-zinc-700 bottom-0 right-0"></div>

  <!-- NAVBAR -->

  <nav class="fixed top-5 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-7xl">

    <div class="glass rounded-full px-7 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">

        <div class="w-11 h-11 rounded-2xl bg-white text-black flex items-center justify-center text-lg font-bold">
          A
        </div>

        <h1 class="text-2xl font-semibold tracking-wide">
          AIEDU
        </h1>

      </div>

      <div class="flex items-center gap-4">

        <a
          href="dashboard.html"
          class="text-gray-400 hover:text-white transition"
        >
          Dashboard
        </a>

        <button
          id="logoutBtn"
          class="px-6 py-3 rounded-full bg-white text-black font-medium hover:scale-105 transition"
        >
          Logout
        </button>

      </div>

    </div>

  </nav>

  <!-- MAIN -->

  <section class="pt-36 px-6 pb-10">

    <div class="max-w-7xl mx-auto">

      <!-- HEADER -->

      <div class="mb-10">

        <p class="uppercase tracking-[4px] text-sm text-gray-500 mb-4">
          AI Whiteboard
        </p>

        <h1 class="text-5xl font-black leading-tight mb-4">

          Draw Your
          <span class="gradient-text">
            Problem
          </span>

        </h1>

        <p class="text-gray-400 max-w-2xl">

          Draw any equation, diagram, graph, or handwritten question.
          Gemini AI will analyze and solve it instantly.

        </p>

      </div>

      <!-- LAYOUT -->

      <div class="grid lg:grid-cols-3 gap-8">

        <!-- WHITEBOARD -->

        <div class="lg:col-span-2">

          <div class="glass rounded-[32px] p-5">

            <!-- TOOLS -->

            <div class="flex flex-wrap gap-4 items-center mb-5">

              <input
                type="color"
                id="colorPicker"
                value="#ffffff"
                class="w-12 h-12 rounded-xl border border-white/10 bg-transparent cursor-pointer"
              />

              <input
                type="range"
                id="brushSize"
                min="1"
                max="20"
                value="4"
                class="cursor-pointer"
              />

              <button
                id="clearBoard"
                class="px-5 py-3 rounded-xl bg-red-500/20 border border-red-500/20"
              >
                Clear
              </button>

              <button
                id="resetBoard"
                class="px-5 py-3 rounded-xl glass"
              >
                Reset
              </button>

              <button
                id="sendBtn"
                class="ml-auto px-7 py-3 rounded-xl bg-white text-black font-semibold hover:scale-105 transition"
              >
                Ask AI
              </button>

            </div>

            <!-- CANVAS -->

            <div class="h-[700px] rounded-3xl overflow-hidden border border-white/10">

              <canvas
                id="board"
                class="w-full h-full bg-[#0a0a0a]"
              ></canvas>

            </div>

          </div>

        </div>

        <!-- CHAT -->

        <div>

          <div class="glass rounded-[32px] p-6 h-[760px] flex flex-col">

            <div class="flex items-center gap-3 mb-6">

              <div class="w-14 h-14 rounded-2xl bg-white text-black flex items-center justify-center text-2xl">

                <i class="ri-robot-2-fill"></i>

              </div>

              <div>

                <h2 class="text-2xl font-bold">
                  Gemini AI
                </h2>

                <p class="text-gray-500 text-sm">
                  Smart problem solving
                </p>

              </div>

            </div>

            <!-- MESSAGES -->

            <div
              id="aiMessages"
              class="flex-1 overflow-y-auto space-y-4 pr-2"
            >

              <div class="bg-white/5 border border-white/10 rounded-2xl p-4">

                👋 Hello! Draw your question and click
                <b>Ask AI</b>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- SCRIPTS -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./js/config.js"></script>

  <script src="./js/chatbot.js"></script>

</body>

</html>
