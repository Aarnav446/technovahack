<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AIEDU - AI Whiteboard</title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Remix Icons -->

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
    rel="stylesheet"
  />

  <!-- GSAP -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;
  min-height:100vh;
  position:relative;
}

/* RANGE */

input[type="range"]{
  width:120px;
}

/* GRID */

.grid-bg{
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

  background-size:50px 50px;
}



/* GLASS */

.glass{

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,0.12);

  box-shadow:
  0 8px 32px rgba(0,0,0,0.35);

  position:relative;
  z-index:10;
}

/* TEXT */

.gradient-text{
  background:linear-gradient(to right,#ffffff,#9ca3af);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BLUR BALLS */

.blur-ball{

  position:fixed;

  width:180px;
  height:180px;

  border-radius:50%;

  filter:blur(120px);

  opacity:0.12;

  z-index:0;
}

/* CANVAS */

#board{
  cursor:crosshair;
  display:block;
  touch-action:none;
  background:#111111;
  width:100%;
  height:100%;
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#27272a;
  border-radius:20px;
}

/* CHAT */

.message-user{
  background:white;
  color:black;
  padding:14px;
  border-radius:18px;
  margin-left:auto;
  max-width:85%;
}

.message-ai{
  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  padding:14px;

  border-radius:18px;

  max-width:85%;

  line-height:1.6;

  color:#d4d4d8;
}

/* FIX MAIN CONTENT */

main,
nav,
section,
canvas,
#aiMessages{
  position:relative;
  z-index:10;
}

/* ACTIVE TOOL */

.active{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
}

</style>

</head>

<body class="grid-bg">

  <!-- BLUR BALLS -->

  <div class="blur-ball bg-white top-0 left-0"></div>

  <div class="blur-ball bg-zinc-700 bottom-0 right-0"></div>

  <!-- NAVBAR -->

  <nav class="fixed top-5 left-1/2 -translate-x-1/2 z-50 w-[94%] max-w-7xl">

    <div class="glass rounded-full px-7 py-4 flex items-center justify-between">

      <!-- LOGO -->

      <a
        href="dashboard.html"
        class="flex items-center gap-3"
      >

        <div class="w-11 h-11 rounded-2xl bg-white text-black flex items-center justify-center text-lg font-bold">

          A

        </div>

        <h1 class="text-2xl font-semibold tracking-wide">
          AIEDU
        </h1>

      </a>

      <!-- RIGHT -->

      <div class="flex items-center gap-4">

        <a
          href="dashboard.html"
          class="text-gray-400 hover:text-white transition"
        >
          Dashboard
        </a>

        <button
          id="logoutBtn"
          class="px-6 py-3 rounded-full bg-white text-black font-semibold hover:scale-105 transition"
        >

          Logout

        </button>

      </div>

    </div>

  </nav>

  <!-- MAIN -->

  <main class="pt-28 px-6 pb-12">

    <div class="max-w-7xl mx-auto">

      <!-- HEADER -->

      <div class="mb-10">

        <p class="uppercase tracking-[4px] text-sm text-gray-500 mb-4">

          AI Whiteboard

        </p>

        <h1 class="text-4xl md:text-5xl font-black leading-tight mb-5">

          Draw &
          <span class="gradient-text">

            Solve

          </span>

          Problems

        </h1>

        <p class="text-gray-400 max-w-2xl leading-relaxed">

          Draw equations, diagrams, graphs, or handwritten questions.
          AI instantly analyzes and explains everything.

        </p>

      </div>

      <!-- GRID -->

      <div class="grid lg:grid-cols-3 gap-8">

        <!-- WHITEBOARD -->

        <div class="lg:col-span-2">

          <div class="glass rounded-[32px] p-5">

            <!-- TOOLS -->

            <div class="flex flex-wrap items-center gap-4 mb-5">

              <input
                type="color"
                id="colorPicker"
                value="#ffffff"
                class="w-12 h-12 rounded-xl bg-transparent cursor-pointer border border-white/10"
              />

              <input
                type="range"
                id="brushSize"
                min="1"
                max="25"
                value="4"
                class="cursor-pointer"
              />

              <button
                id="drawTool"
                class="px-5 py-3 rounded-xl glass hover:bg-white/5 transition active"
              >

                Draw

              </button>

              <button
                id="eraserTool"
                class="px-5 py-3 rounded-xl glass hover:bg-white/5 transition"
              >

                Eraser

              </button>

              <button
                id="textTool"
                class="px-5 py-3 rounded-xl glass hover:bg-white/5 transition"
              >

                Text

              </button>

              <button
                id="clearBoard"
                class="px-5 py-3 rounded-xl bg-red-500/20 border border-red-500/20 hover:bg-red-500/30 transition"
              >

                Clear

              </button>

              <button
                id="resetBoard"
                class="px-5 py-3 rounded-xl glass hover:bg-white/5 transition"
              >

                Reset

              </button>

              <button
                id="sendBtn"
                class="ml-auto px-8 py-3 rounded-xl bg-white text-black font-semibold hover:scale-105 transition"
              >

                Ask AI

              </button>

            </div>

            <!-- CANVAS -->

            <div class="h-[580px] rounded-3xl overflow-hidden border border-white/10">

              <canvas
                id="board"
                class="w-full h-full bg-[#0a0a0a]"
              ></canvas>

            </div>

          </div>

        </div>

        <!-- CHAT -->

        <div>

          <div class="glass rounded-[32px] p-6 h-[760px] flex flex-col">

            <!-- TOP -->

            <div class="flex items-center gap-4 mb-6">

              <div class="w-14 h-14 rounded-2xl bg-white text-black flex items-center justify-center text-2xl">

                <i class="ri-robot-2-fill"></i>

              </div>

              <div>

                <h2 class="text-2xl font-bold">

                  Gemini AI

                </h2>

                <p class="text-gray-500 text-sm">

                  Smart problem solving

                </p>

              </div>

            </div>

            <!-- CHAT AREA -->

            <div
              id="aiMessages"
              class="flex-1 overflow-y-auto space-y-4 pr-2"
            >

              <div class="message-ai">

                👋 Hello! Draw your problem or type your question below.

              </div>

            </div>

            <!-- INPUT -->

            <div class="mt-5 flex gap-3">

              <input
                type="text"
                id="userPrompt"
                placeholder="Ask AI anything..."
                class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 outline-none"
              />

              <button
                id="sendTextBtn"
                class="px-6 rounded-2xl bg-white text-black font-semibold hover:scale-105 transition"
              >

                Send

              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </main>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CONFIG -->

  <script src="./js/config.js"></script>

  <!-- CHATBOT LOGIC -->

  <script src="./js/chatbot.js"></script>

  <!-- GSAP -->

  <script>

gsap.from("nav",{
  y:-80,
  opacity:0,
  duration:1
});

gsap.from("h1,p",{
  y:40,
  opacity:0,
  duration:1,
  stagger:0.08
});

gsap.from(".glass",{
  y:30,
  opacity:0,
  stagger:0.08,
  duration:0.8,
  clearProps:"all"
});

</script>

</body>

</html>
